version: '3.9'

networks:
  app:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [app]
    environment:
      POSTGRES_DB: pixtager
      POSTGRES_USER: pixtager
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixtager"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [app]
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [app]
    env_file: .env
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://pixtager:Petr2004-@postgres:5432/pixtager
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/uploads
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [app]
    command: node dist/workers/imageWorker.js
    env_file: .env
    environment:
      DATABASE_URL: postgresql://pixtager:Petr2004-@postgres:5432/pixtager
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/uploads
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [app]
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: https://pixtager.ru/api-backend
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    networks: [app]
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  redisdata:
  uploads:
